name: ci

# Runs on every push to any branch and on every PR. Only read access is
# needed; this workflow does not push, comment, or upload artifacts.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify_repo (Linux, pinned deps + gitleaks 8.28.0)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show environment
        run: |
          python --version
          uname -sm

      - name: Install pinned runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.lock -r requirements-dev.lock
          pip install -e .

      - name: Install pinned gitleaks 8.28.0 (verified SHA-256)
        run: |
          python tools/install_gitleaks.py --target .tools/gitleaks/8.28.0
          .tools/gitleaks/8.28.0/gitleaks version

      - name: Run repository verify gate
        run: |
          python tools/verify_repo.py --require-clean
